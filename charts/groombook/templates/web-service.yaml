apiVersion: v1
kind: Service
metadata:
  name: {{ include "groombook.fullname" . }}-web
  labels:
    {{- include "groombook.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  selector:
    {{- include "groombook.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: 80
      protocol: TCP
      name: http

